    <meta name="keywords" content="course,courses,course organize,course organizer,personal course organizer">

<body>
    <header>
        <nav>
            <h1>Personal Course Organizer</h1>
            <ul >
                <li >
                    <a href="index.html">
                       <span > Home</span>

                </li>
            </ul>
        </nav>
    </header>
    

   <main>
      <form method="post" class="form">
        <fieldset>
            <legend>Add New Course</legend>
            <div>
                <label for="cname">Course Name:</label>
                <input id="cname" type="text" name="cname" placeholder="enter course name" required>
            </div>
            <div>
                <label for="instructor">Instructor:</label>
                <input id="instructor" type="text" name="instructor" placeholder="enter instructor name" required>
            </div>
            <div>
                <label for="hours">Credit Hours:</label>
                <input id="hours" type="number" name="hours" placeholder="enter course's credit hours" required>
            </div>
            <div>
                <label for="note">Notes:</label>
                <textarea id="note" name="notes" rows=4></textarea>
            </div>
            <input type="submit" value="add">
        </fieldset>
      </form>
   </main>
